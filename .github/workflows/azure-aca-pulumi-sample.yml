name: Azure ACA Blue-Green (Pulumi C# Sample)

on:
  push:
    branches: [ deployments ]
    paths:
      - "src/Infrastructure/Infrastructure.AzureContainerApps.Sample/**"
      - ".github/workflows/azure-aca-pulumi-sample.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_AUDIENCE: api://AzureADTokenExchange
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

jobs:
  infra:
    runs-on: ubuntu-latest
    outputs:
      acr_name: ${{ steps.export.outputs.acr_name }}
      acr_login_server: ${{ steps.export.outputs.acr_login_server }}
      resource_group_name: ${{ steps.export.outputs.resource_group_name }}
      container_app_name: ${{ steps.export.outputs.container_app_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: ${{ env.AZURE_AUDIENCE }}

      - name: Pulumi up (provision RG/ACR/ACA env/identity)
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: dev
          work-dir: src/Infrastructure/Infrastructure.AzureContainerApps.Sample

      - name: Read Pulumi outputs (json)
        working-directory: src/Infrastructure/Infrastructure.AzureContainerApps.Sample
        shell: bash
        run: pulumi stack output --json > "${{ github.workspace }}/.pulumi-outputs-infra.json"

      - name: Export outputs
        id: export
        run: |
          ACR_NAME=$(jq -r '.acrName' "${{ github.workspace }}/.pulumi-outputs-infra.json")
          ACR_LOGIN_SERVER=$(jq -r '.acrLoginServer' "${{ github.workspace }}/.pulumi-outputs-infra.json")
          RG_NAME=$(jq -r '.resourceGroupName' "${{ github.workspace }}/.pulumi-outputs-infra.json")
          APP_NAME=$(jq -r '.containerAppName' "${{ github.workspace }}/.pulumi-outputs-infra.json")
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$RG_NAME" >> "$GITHUB_OUTPUT"
          echo "container_app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

  build_and_push:
    runs-on: ubuntu-latest
    needs: [ infra ]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: ${{ env.AZURE_AUDIENCE }}

      - name: ACR login
        run: az acr login --name "${{ needs.infra.outputs.acr_name }}"

      - name: Build and push image
        working-directory: src/Infrastructure/Infrastructure.AzureContainerApps.Sample/app
        run: |
          docker build \
            --file Dockerfile \
            --build-arg GIT_SHA="${{ steps.meta.outputs.image_tag }}" \
            --tag "${{ needs.infra.outputs.acr_login_server }}/sample-api:${{ steps.meta.outputs.image_tag }}" \
            .
          docker push "${{ needs.infra.outputs.acr_login_server }}/sample-api:${{ steps.meta.outputs.image_tag }}"

  deploy_staging:
    runs-on: ubuntu-latest
    needs: [ build_and_push, infra ]
    outputs:
      staging_url: ${{ steps.export.outputs.staging_url }}
      latest_revision_name: ${{ steps.export.outputs.latest_revision_name }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: ${{ env.AZURE_AUDIENCE }}

      - name: Deploy candidate revision (image + 0% traffic to latest)
        shell: bash
        env:
          RG: ${{ needs.infra.outputs.resource_group_name }}
          APP: ${{ needs.infra.outputs.container_app_name }}
          IMAGE: ${{ needs.infra.outputs.acr_login_server }}/sample-api:${{ needs.build_and_push.outputs.image_tag }}
        run: |
          set -euo pipefail
          PREV_REV="$(az containerapp show -g "$RG" -n "$APP" --query "properties.latestRevisionName" -o tsv)"
          az containerapp update -g "$RG" -n "$APP" --container-name api --image "$IMAGE"
          NEW_REV="$(az containerapp show -g "$RG" -n "$APP" --query "properties.latestRevisionName" -o tsv)"
          az containerapp ingress traffic set -g "$RG" -n "$APP" \
            --revision-weight "${PREV_REV}=100" \
            --revision-weight "${NEW_REV}=0"

      - name: Export outputs
        id: export
        shell: bash
        env:
          RG: ${{ needs.infra.outputs.resource_group_name }}
          APP: ${{ needs.infra.outputs.container_app_name }}
        run: |
          set -euo pipefail
          FQDN="$(az containerapp show -g "$RG" -n "$APP" --query "properties.latestRevisionFqdn" -o tsv)"
          REV="$(az containerapp show -g "$RG" -n "$APP" --query "properties.latestRevisionName" -o tsv)"
          echo "staging_url=https://${FQDN}" >> "$GITHUB_OUTPUT"
          echo "latest_revision_name=$REV" >> "$GITHUB_OUTPUT"

  smoke_test:
    runs-on: ubuntu-latest
    needs: [ deploy_staging, build_and_push ]
    outputs:
      new_revision_name: ${{ steps.capture.outputs.new_revision_name }}
    steps:
      - name: Smoke test /health
        run: |
          curl --retry 12 --retry-delay 5 --retry-all-errors -f "${{ needs.deploy_staging.outputs.staging_url }}/health"

      - name: Smoke test /version matches SHA
        run: |
          EXPECTED="${{ needs.build_and_push.outputs.image_tag }}"
          ACTUAL=$(curl -fsSL "${{ needs.deploy_staging.outputs.staging_url }}/version" | jq -r '.commit')
          test "$ACTUAL" = "$EXPECTED"

      - name: Capture new revision name
        id: capture
        run: echo "new_revision_name=${{ needs.deploy_staging.outputs.latest_revision_name }}" >> "$GITHUB_OUTPUT"

  promote_to_production:
    runs-on: ubuntu-latest
    needs: [ smoke_test, infra ]
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: ${{ env.AZURE_AUDIENCE }}

      - name: Promote latest revision to 100% traffic
        shell: bash
        env:
          RG: ${{ needs.infra.outputs.resource_group_name }}
          APP: ${{ needs.infra.outputs.container_app_name }}
        run: |
          set -euo pipefail
          REV="${{ needs.smoke_test.outputs.new_revision_name }}"
          az containerapp ingress traffic set -g "$RG" -n "$APP" --revision-weight "${REV}=100"

